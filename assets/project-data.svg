      <stop offset="0" stop-color="#FFF7ED"/>
      <stop offset="0.42" stop-color="#FFE4E6"/>
      <stop offset="1" stop-color="#FED7AA"/>
    </linearGradient>

    <linearGradient id="card" x1="120" y1="92" x2="840" y2="462" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.88"/>
